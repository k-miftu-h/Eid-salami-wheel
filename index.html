<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami Wheel 🎁</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">

        <!-- ① LOGIN SCREEN -->
        <section id="login-screen" class="screen active">
            <div class="login-card">
                <h1 class="login-title">Eid Salami Portal</h1>
                <div class="input-wrap">
                    <input type="text" id="code-input"
                           placeholder=""
                           autocomplete="off" spellcheck="false">
                </div>
                <p id="error-text" class="error-msg"></p>
                <button id="login-btn" class="primary-btn">প্রবেশ করো →</button>
            </div>
        </section>

        <!-- ② WHEEL SCREEN -->
        <section id="wheel-screen" class="screen">
            <header class="app-header">
                <h2 class="eid-title-small">🎡 Eid Salami Wheel</h2>
                <div class="spins-left-badge">Spins: <span id="spins-left-count">3</span></div>
            </header>

            <main class="wheel-container">
                <div class="wheel-outer">
                    <div class="wheel-pointer"></div>
                    <div id="wheel" class="wheel"></div>
                </div>

                <div class="result-area">
                    <p id="total-salami" class="total-won"></p>
                </div>

                <button id="spin-btn" class="spin-btn">SPIN NOW 🎰</button>
                <p id="wheel-error" class="error-msg"></p>
            </main>
        </section>

        <!-- ③ MESSAGE SCREEN (Batch / SNR) -->
        <section id="message-screen" class="screen">
            <div class="message-card">
                <div class="message-emoji" id="message-emoji">🎉</div>
                <h2 class="message-title" id="message-title">Notice</h2>
                <p class="message-body" id="message-body"></p>
                <button class="go-back-btn" onclick="goBack()">← আবার চেষ্টা করো</button>
            </div>
        </section>

        <!-- LOADING OVERLAY -->
        <div id="loading-overlay" class="overlay">
            <div class="loader"></div>
        </div>

        <!-- RESULT MODAL -->
        <div id="result-modal" class="modal">
            <div class="modal-box">
                <h2 id="modal-amount">+20 টাকা</h2>
                <p id="modal-message">বেশি ক্লোজ জুনিয়র</p>
                <p id="modal-bkash" class="modal-bkash" style="display:none"></p>
                <button id="close-modal">✅ OK</button>
            </div>
        </div>

    </div>
    <script type="module" src="script.js"></script>
</body>

</html>
